# ─────────────────────────────────────────
#  GLOBAL
# ─────────────────────────────────────────
global:
  environment: base

# ─────────────────────────────────────────
#  BASE DE DATOS (Bitnami PostgreSQL)
# ─────────────────────────────────────────
db:
  enabled: true
  image:
    tag: "15.6.0-debian-11-r16"
  auth:
    username: pedidouser
    password: ""
    database: pedidodb
    postgresPassword: ""
  primary:
    persistence:
      enabled: true
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# ─────────────────────────────────────────
#  BACKEND (Spring Boot)
# ─────────────────────────────────────────
backend:
  image:
    repository: suryaputraku/spring-boot-crud
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  env:
    SPRING_DATASOURCE_URL: "jdbc:postgresql://parcial1-postgresql:5432/pedidodb"
    SPRING_DATASOURCE_USERNAME: pedidouser

# ─────────────────────────────────────────
#  FRONTEND (React/Nginx)
# ─────────────────────────────────────────
frontend:
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ─────────────────────────────────────────
#  INGRESS
# ─────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: parcial1.ejemplo.com
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
